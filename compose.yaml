# Runs on the Debian VM. The image is loaded by scripts/deploy.sh (docker load);
# map data persists in a host directory bind-mounted at /data, untouched by
# re-deploys. Serve on :3000 (front with a reverse proxy later if desired).
services:
  map-tracker:
    image: map-tracker:latest
    container_name: map-tracker
    restart: unless-stopped
    # Run as the host user that owns the bind mount (set by deploy.sh via .env),
    # so the data dir needs no chown to a foreign uid — and thus no sudo. Falls
    # back to the image's built-in user (1001) if unset.
    user: "${MAP_TRACKER_UID:-1001}:${MAP_TRACKER_GID:-1001}"
    ports:
      - "3000:3000"
    environment:
      MAP_TRACKER_DATA_DIR: /data
    volumes:
      # Host path is set by deploy.sh via a sibling .env (MAP_TRACKER_HOST_DATA).
      - ${MAP_TRACKER_HOST_DATA:-/var/lib/map-tracker}:/data
